<style>
  :root { color-scheme: light; }

  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  .eyebrow { color: #a8763e; letter-spacing: .06em; font-size: 11px; text-transform: uppercase; font-weight: 600; }

  .subtitle { color: #6b6154; font-style: italic; margin-bottom: 16px; }
  .badge-range {
    float: right; margin-top: -70px; background: #fff; border: 1px solid #e6dcc8;

  }

  .tab {
    padding: 9px 14px; cursor: pointer; border: 1px solid transparent; border-bottom: none;
    border-radius: 6px 6px 0 0; font-size: 13px; color: #6b6154; background: transparent;
  }
  .tab.active { background: #fff; border-color: #e6dcc8; color: #2b2620; font-weight: 600; }
  .aba-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .aba-header h2 { margin: 0; font-size: 22px; }
  .aba-header .count { color: #6b6154; font-size: 13px; }
  .totais-topo { text-align: right; }
  .totais-topo .num { font-size: 20px; font-weight: 700; }
  .totais-topo .lbl { font-size: 10px; color: #6b6154; text-transform: uppercase; letter-spacing: .05em; }
  .toggle { display: inline-flex; border: 1px solid #d8cdb5; border-radius: 7px; overflow: hidden; margin-left: 14px; vertical-align: middle; }
  .toggle button {
    border: none; background: #fff; padding: 7px 14px; font-size: 12px; cursor: pointer; color: #6b6154;
  }
  .toggle button.active { background: #2b2620; color: #fff; }
  hr.sep { border: none; border-top: 1px solid #e6dcc8; margin: 12px 0 18px; }
  .loja-card { margin-bottom: 26px; }
  .cod {
    display: inline-block; background: #f0b23a; color: #2b2620; font-weight: 700; font-size: 11px;
    padding: 3px 8px; border-radius: 4px; margin-right: 8px;
  }
  .cod.total { background: #2b2620; color: #fff; }
  .loja-title { font-size: 16px; font-weight: 700; }
  .loja-periodo { color: #9a9081; font-size: 12px; margin-left: 6px; }
  .loja-meta { color: #6b6154; font-size: 12.5px; margin: 4px 0 8px; }
  .loja-meta b { color: #2b2620; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th, td { padding: 7px 10px; text-align: right; }
  th:first-child, td:first-child { text-align: left; }
  th, td { color: #fff; }
  th:first-child, td:first-child { color: #6b6154; background: transparent; }
  thead th:first-child { background: transparent; }
  /* colunas de ano alternam cinza-escuro e dourado, igual ao artifact original */
  .yr-gray { background: #5f5c56; }
  .yr-gold { background: #e3a53d; }
  thead th.yr-gray { background: #4a4842; color: #fff; }
  thead th.yr-gold { background: #d6952b; color: #2b2620; }
  tbody td.yr-gray { background: #706c64; }
  tbody td.yr-gold { background: #eab655; color: #2b2620; }
  tfoot td.yr-gray, tfoot td:first-child { background: #3d3b36; color: #fff; font-weight: 700; }
  tfoot td.yr-gold { background: #d6952b; color: #2b2620; font-weight: 700; }
  tfoot td { font-weight: 700; }
  .footer-note { text-align: center; color: #a8a08f; font-size: 11px; margin-top: 30px; }

const ABAS = ["Atibaia", "Piracaia", "Jundiaí e Varzea", "Bragança", "Itatiba", "Itupeva e Cabreuva", "Jarinu", "Louveira", "Campos", "Morungaba", "Socorro", "Pirassununga"];
const ANO_MIN = 2019, ANO_MAX = 2026;
const MESES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

let modo = "litros"; // ou "atendimentos"
let abaAtiva = ABAS[0];

function fmt(n) {
  if (n === null || n === undefined) return "–";
  return Math.round(n).toLocaleString("pt-BR");
}

function codigosDaAba(aba) {
  return Object.entries(DADOS).filter(([c, info]) => info.aba === aba).map(([c]) => c).sort();
}

function totalLoja(info, campo) {
  return Object.values(info.dados).reduce((s, v) => s + (v[campo] || 0), 0);
}

function periodoLoja(info) {
  const chaves = Object.keys(info.dados).sort();
  if (!chaves.length) return "";
  const [anoI, mesI] = chaves[0].split("-");
  const [anoF, mesF] = chaves[chaves.length - 1].split("-");
  return `${mesI}/${anoI} – ${mesF}/${anoF}`;
}

function tabelaHtml(getDados) {
  const anos = [];
  for (let a = ANO_MIN; a <= ANO_MAX; a++) anos.push(a);
  const clsAno = i => (i % 2 === 0 ? "yr-gray" : "yr-gold");

  let h = "<table><thead><tr><th>Mês</th>";
  anos.forEach((a, i) => h += `<th class="${clsAno(i)}">${a}</th>`);
  h += "</tr></thead><tbody>";
  const totais = anos.map(() => 0);
  for (let m = 1; m <= 12; m++) {
    h += `<tr><td>${MESES[m-1]}</td>`;
    anos.forEach((a, i) => {
      const v = getDados(a, m);
      if (v !== null && v !== undefined) totais[i] += v;
      h += `<td class="${clsAno(i)}">${fmt(v)}</td>`;
    });
    h += "</tr>";
  }
  h += "</tbody><tfoot><tr><td>Total</td>";
  totais.forEach((t, i) => h += `<td class="${clsAno(i)}">${fmt(t)}</td>`);
  h += "</tr></tfoot></table>";
  return h;
}

function lojaCardHtml(code, info) {
  const lit = totalLoja(info, "litros");
  const at = totalLoja(info, "atendimentos");
  const razao = at ? (lit / at).toFixed(1) : "–";
  const getV = (a, m) => {
    const d = info.dados[`${a}-${String(m).padStart(2,"0")}`];
    return d ? d[modo] : null;
  };
  return `
    <div class="loja-card">
      <span class="cod">COD ${code}</span>
      <span class="loja-title">${code} - ${info.nome.replace(/\s*\(\d+\)\s*$/,"")}</span>
      <span class="loja-periodo">${periodoLoja(info)}</span>
      <div class="loja-meta">Litragem total <b>${fmt(lit)} L</b> &nbsp; Atendimentos <b>${fmt(at)}</b> &nbsp; L / atend. <b>${razao}</b></div>
      ${tabelaHtml(getV)}
    </div>`;
}

function totalAbaHtml(aba, codigos) {
  const getV = (a, m) => {
    let soma = null;
    codigos.forEach(c => {
      const d = DADOS[c].dados[`${a}-${String(m).padStart(2,"0")}`];
      if (d && d[modo] !== null && d[modo] !== undefined) {
        soma = (soma || 0) + d[modo];
      }
    });
    return soma;
  };
  let litTot = 0, atTot = 0;
  codigos.forEach(c => { litTot += totalLoja(DADOS[c], "litros"); atTot += totalLoja(DADOS[c], "atendimentos"); });
  const razao = atTot ? (litTot / atTot).toFixed(1) : "–";
  return `
    <div class="loja-card">
      <span class="cod total">TOTAL</span>
      <span class="loja-title">Todas as lojas — ${aba}</span>
      <div class="loja-meta">Litragem total <b>${fmt(litTot)} L</b> &nbsp; Atendimentos <b>${fmt(atTot)}</b> &nbsp; L / atend. <b>${razao}</b></div>
      ${tabelaHtml(getV)}
    </div>`;
}

function render() {
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = ABAS.map(a => `<div class="tab ${a===abaAtiva?"active":""}" data-aba="${a}">${a}</div>`).join("");
  tabsEl.querySelectorAll(".tab").forEach(t => t.onclick = () => { abaAtiva = t.dataset.aba; render(); });

  const codigos = codigosDaAba(abaAtiva);
  let litTot = 0, atTot = 0;
  codigos.forEach(c => { litTot += totalLoja(DADOS[c], "litros"); atTot += totalLoja(DADOS[c], "atendimentos"); });

  const content = document.getElementById("content");
  content.innerHTML = `
    <div class="aba-header">
      <div>
        <h2>${abaAtiva}</h2>
        <div class="count">${codigos.length} loja${codigos.length>1?"s":""} nesta aba</div>
      </div>
      <div class="totais-topo">
        <span><span class="num">${fmt(litTot)} L</span><br><span class="lbl">Litragem</span></span>
        &nbsp;&nbsp;
        <span><span class="num">${fmt(atTot)}</span><br><span class="lbl">Atendimentos</span></span>
        <span class="toggle">
          <button id="btnLitros" class="${modo==='litros'?'active':''}">Litragem</button>
          <button id="btnAtend" class="${modo==='atendimentos'?'active':''}">Atendimentos</button>
        </span>
      </div>
    </div>
    <hr class="sep">
    ${codigos.map(c => lojaCardHtml(c, DADOS[c])).join("")}
    ${codigos.length > 1 ? totalAbaHtml(abaAtiva, codigos) : ""}
  `;
  document.getElementById("btnLitros").onclick = () => { modo = "litros"; render(); };
  document.getElementById("btnAtend").onclick = () => { modo = "atendimentos"; render(); };

  document.getElementById("badgeRange").innerHTML =
    `<b>${ANO_MIN}-${ANO_MAX}</b>${ABAS.length} abas · ${Object.keys(DADOS).length} lojas`;
}

render();
</script>
